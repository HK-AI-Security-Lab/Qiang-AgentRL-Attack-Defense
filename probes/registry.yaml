probes:
  # ──────────── Blue-team attack-surface probes (existing) ────────────
  - id: probe_cmd_injection
    script: probes/attack_surface/probe_cmd_injection.sh
    category: attack_surface
    severity: high
    expected: blocked
    description: >
      Basic command injection via /ping with `; id` payload.

  - id: probe_host_mount
    script: probes/attack_surface/probe_host_mount.sh
    category: attack_surface
    severity: high
    expected: blocked
    description: Host root filesystem accessible at /host inside container.

  - id: probe_docker_sock
    script: probes/attack_surface/probe_docker_sock.sh
    category: attack_surface
    severity: high
    expected: blocked
    description: Docker socket exposed inside the container.

  - id: probe_userns
    script: probes/attack_surface/probe_userns.sh
    category: attack_surface
    severity: medium
    expected: blocked
    description: User namespace creation allowed (kernel escape precondition).

  - id: probe_proc_kallsyms
    script: probes/attack_surface/probe_proc_kallsyms.sh
    category: attack_surface
    severity: medium
    expected: blocked
    description: Kernel symbol addresses leaked via /proc/kallsyms.

  # ──────────── Blue-team regression probes (existing) ────────────
  - id: regression_health
    script: probes/regression/regression_health.sh
    category: regression
    severity: high
    expected: pass

  - id: regression_legit_ping
    script: probes/regression/regression_legit_ping.sh
    category: regression
    severity: high
    expected: pass

  - id: regression_home
    script: probes/regression/regression_home.sh
    category: regression
    severity: medium
    expected: pass

  # ──────────── Red-team probes (new: multi-technique bypass) ─────
  - id: red_cmd_injection
    script: probes/red_team/red_cmd_injection.sh
    category: red_team
    severity: high
    expected: blocked
    description: >
      Multi-payload command injection (semicolon, pipe, newline,
      URL-encoding, IFS tricks). Tests WAF bypass depth.

  - id: red_ssrf
    script: probes/red_team/red_ssrf.sh
    category: red_team
    severity: high
    expected: blocked
    description: >
      SSRF via /fetch — loopback, metadata endpoints, file:// protocol,
      decimal IP bypass.

  - id: red_path_traversal
    script: probes/red_team/red_path_traversal.sh
    category: red_team
    severity: high
    expected: blocked
    description: >
      Path traversal via /read — ../../../etc/passwd with encoding variants.

  - id: red_sqli
    script: probes/red_team/red_sqli.sh
    category: red_team
    severity: high
    expected: blocked
    description: >
      SQL injection via /search — UNION-based, boolean-based, stacked queries.

  - id: red_ssti
    script: probes/red_team/red_ssti.sh
    category: red_team
    severity: high
    expected: blocked
    description: >
      Jinja2 SSTI via /render — {{7*7}}, class traversal, config leak,
      lipsum RCE.

  - id: red_deserialization
    script: probes/red_team/red_deserialization.sh
    category: red_team
    severity: high
    expected: blocked
    description: >
      Insecure pickle deserialization via /load — RCE via __reduce__.
